<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GES Mahsuplaşma Raporu — Hata</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e0e0e0; border-radius: 5px; }
        .header { background-color: #f44336; color: white; padding: 10px 20px; border-radius: 5px 5px 0 0; text-align: center; }
        .content { padding: 20px; }
        .footer { font-size: 0.8em; color: #777; text-align: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px; }
        .error-box { background-color: #ffebee; border-left: 5px solid #f44336; padding: 10px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>GES Mahsuplaşma Raporu — Hata</h2>
        </div>
        <div class="content">
            <p>Merhaba,</p>
            <p>Günlük mahsuplaşma raporu hazırlanırken bir sorun oluştu. Teknik ekip bilgilendirilmiştir.</p>
            <table>
                <tr><td>Durum</td><td><strong style="color: #f44336;">Başarısız</strong></td></tr>
                <tr><td>Tarih</td><td>$REPORT_DATE</td></tr>
            </table>
            <div class="error-box">
                <strong>Hata Özeti:</strong><br>
                $ERROR_SUMMARY
            </div>
        </div>
        <div class="footer">
            Bu e-posta GES Enerji Yönetim Sistemi tarafından otomatik olarak oluşturulmuştur.
        </div>
    </div>
</body>
</html>
